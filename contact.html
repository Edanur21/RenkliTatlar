<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css" integrity="sha512-KfkfwYDsLkIlwQp6LFnl8zNdLGxu9YAA1QvwINks4PhcElQSvqcyVLLD9aMhXd13uQjoXtEKNosOWaZqXgel0g==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>İletişim</title>
    <link rel="stylesheet" href="styles/style.css" />
</head>

<body>
    <!--! header section start-->
    <header class="header">
         <a href="#" class="logo">
            <img src="images/logo.png" alt="logo" />
         </a>
         <nav class="navbar">
           <a href="index.html" >Anasayfa</a>
           <a href="about.html">Hakkımızda</a>
           <a href="menu.html">Menü</a>
           <a href="products.html" >Ürünler</a>
           <a href="review.html">Yorumlar</a>
           <a href="contact.html" class="active">İletişim</a>
           <a href="blogs.html">Bloglar</a>
         </nav>

         <div class="buttons">
            <button id="search-btn">
                <i class="fas fa-search"></i>
            </button>
            <button id="cart-btn">
                <i class="fas fa-shopping-cart"></i>
            </button>
            <button id="menu-btn">
                <i class="fas fa-bars"></i>
            </button>
         </div>

         <div class="search-form">
            <input
            type="text"
            class="search-input"
            id="search-box"
            placeholder="arama yapın"
            />
            <i class="fas fa-search"></i>
         </div>

         <div class="cart-items-container">
            <div class="cart-item">
                <i class="fas fa-times"></i>
                <img src="images/menu-1.png" alt="menu">
                <div class="content">
                    <h3>Sepet Ürünü 01</h3>
                    <div class="price">200₺</div>
                </div>
            </div>
            <div class="cart-item">
                <i class="fas fa-times"></i>
                <img src="images/menu-2.png" alt="menu">
                <div class="content">
                    <h3>Sepet Ürünü 02</h3>
                    <div class="price">200₺</div>
                </div>
            </div>
            <div class="cart-item">
                <i class="fas fa-times"></i>
                <img src="images/menu-3.png" alt="menu">
                <div class="content">
                    <h3>Sepet Ürünü 03</h3>
                    <div class="price">100₺</div>
                </div>
            </div>
            <div class="cart-item">
                <i class="fas fa-times"></i>
                <img src="images/menu-4.png" alt="menu">
                <div class="content">
                    <h3>Sepet Ürünü 04</h3>
                    <div class="price">250₺</div>
                </div>
            </div>
            <a href="#" class="btn">Ödeme Yap</a>
         </div>
    </header>
    <!--! header section end-->

   <!--! contact section start-->
   <section class="contact" id="contact">
    <h1 class="heading">İletİşİm</h1>
    <div class="row">
        <iframe 
        class="map"
        src="https://www.google.com/maps/embed?pb=!1m10!1m8!1m3!1d42348.894276084575!2d41.13594555619856!3d37.91640193746338!3m2!1i1024!2i768!4f13.1!5e0!3m2!1str!2str!4v1741733496168!5m2!1str!2str" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
      <form>
        <h3>İLETİŞİME GEÇ </h3>
        <div class="inputBox">
            <i class="fas fa-user"></i>
            <input type="text" placeholder="isim" />
        </div>
        <div class="inputBox">
            <i class="fas fa-envelope"></i>
            <input type="email" placeholder="email" />
        </div>
        <div class="inputBox">
            <i class="fas fa-phone"></i>
            <input type="number" placeholder="telefon" />
        </div>
        <input type="submit" class="btn" value="İletişime Geç">
      </form>
    </div>
</section>
<!--! contact section end-->
    <!--! footer section start-->
    <section class="footer">
        <div class="search">
            <input type="text"
            class="search-input" 
            placeholder="Ara" />
            <button class ="btn bnt-primary">Arama yap</button>
        </div>
        <div class="share">
            <a href="#" class="fab fa-facebook"></a>
            <a href="#" class="fab fa-twitter"></a>
            <a href="#" class="fab fa-instagram"></a>
            <a href="#" class="fab fa-linkedin"></a>
            <a href="#" class="fab fa-pinterest"></a>
        </div>

        <div class="links">
            <a href="#" class="active">Anasayfa</a>
            <a href="#">Hakkımızda</a>
            <a href="#">Menü</a>
            <a href="#">Ürünler</a>
            <a href="#">Yorumlar</a>
            <a href="#">İletişim</a>
            <a href="#">Bloglar</a>
        </div>

        <div class="credit">
            <span>Edanur BAYRAM </span>tarafından oluşturuldu <br> tüm hakları saklıdır
        </div>
    </section>
    <!--! footer section end-->

</body>

</html>
